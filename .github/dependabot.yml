version: 2
updates:
  # Root package (server + daemon + CLI)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"

  # Web frontend (Vite + React)
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
